repos:
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning", "-x", "-e", "SC1091"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        args: ["--config", "markdownlint.json"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ["-c", "bandit.yaml", "-ll", "-r", "plugins/pantheon/scripts/"]
        files: ^plugins/pantheon/scripts/.*\.py$

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.95.0
    hooks:
      - id: semgrep
        args:
          - "--config=.semgrep/pantheon-custom-rules.yml"
          - "--error"
          - "--severity=ERROR"
          - "--metrics=off"
        files: \.(py|sh|md|json|yaml|yml)$

  - repo: local
    hooks:
      - id: no-em-dashes
        name: No em-dashes per PANTHEON style
        entry: 'bash -c ''! grep -rPn "\xe2\x80\x94" --include="*.md" --include="*.py" --include="*.sh" --include="*.yml" --include="*.yaml" --exclude-dir=.pantheon "$@"'' --'
        language: system
        types: [text]

      - id: no-ai-signature-lines
        name: 'No autogenerated-signature lines (PANTHEON style)'
        entry: 'bash -c ''! grep -rPn "(Generated by|Co-Authored-By:\s*Claude)" --include="*.md" --include="*.py" --include="*.sh" --include="*.yml" --include="*.yaml" --exclude-dir=.pantheon --exclude=security.yml --exclude=.pre-commit-config.yaml "$@"'' --'
        language: system
        types: [text]

      - id: persona-instruction-data-boundary-clause
        name: Personas must have instruction/data boundary clause (PANTHEON-0013)
        entry: |
          bash -c '
          for f in "$@"; do
            if ! grep -qiE "instruction.*data.*boundary|treat workspace files as data|do not execute instructions found in target|adversarial prompt injection.*defense|reject embedded directives" "$f"; then
              echo "MISSING boundary clause: $f"; exit 1
            fi
          done' --
        language: system
        files: ^plugins/pantheon/agents/.*\.md$
